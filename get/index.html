---
permalink: /get/
sitemap: false
---
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-itunes-app" content="app-id={{ site.ios_app_id }}">
    <link rel="shortcut icon" href="{{ site.app_icon | relative_url }}" />
    <link rel="apple-touch-icon" href="{{ site.app_icon | relative_url }}" />
    <title>Get {{ site.app_name }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            background-color: white;
            color: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
        }

        .header {
            border-bottom: 1px solid #e5e7eb;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .app-icon {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            display: block;
        }

        .app-name {
            color: #1a1a1a;
            font-size: 1.25rem;
            font-weight: 700;
            line-height: 1;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 24px;
            text-align: center;
        }

        .redirect-icon {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            display: block;
            margin-bottom: 24px;
        }

        .redirect-title {
            color: #1a1a1a;
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 12px;
        }

        .redirect-subtitle {
            color: #6b7280;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 32px;
        }

        .app-store-link {
            display: inline-block;
        }

        .app-store-badge {
            width: 134px;
            height: auto;
            display: block;
        }
    </style>
    <script>
        setTimeout(function () {
            window.location.href = "{{ site.appstore_link }}";
        }, 300);
    </script>
</head>

<body>
    <header class="header">
        <img src="{{ site.app_icon | relative_url }}" alt="{{ site.app_name }} App Icon" class="app-icon" />
        <span class="app-name">{{ site.app_name }}</span>
    </header>

    <main class="main">
        <img src="{{ site.app_icon | relative_url }}" alt="{{ site.app_name }}" class="redirect-icon" />
        <h1 class="redirect-title">Taking you to the App Store&hellip;</h1>
        <p class="redirect-subtitle">If nothing happens, tap below.</p>
        <a href="{{ site.appstore_link }}" class="app-store-link">
            <img src="{{ 'assets/appstore.png' | relative_url }}" alt="Download on the App Store" class="app-store-badge" />
        </a>
    </main>
</body>

</html>
