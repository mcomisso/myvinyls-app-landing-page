<header class="site-header">
    <a class="skip-link" href="#main-content">Skip to content</a>
    <nav class="main-nav">
        <a href="/" class="logo">
            <img src="{{ site.app_icon | relative_url }}" alt="{{ site.app_name }} Icon" width="40" height="40" srcset="{{ site.app_icon | relative_url }} 1x, {{ 'assets/appicon-small.png' | relative_url }} 3x">
            <span class="logo-text">{{ site.app_name }}</span>
        </a>

        <ul class="nav-links">
            <li><a href="/blog/">Blog</a></li>
            <li><a href="/faq/">FAQ</a></li>
            <li>
                <button class="theme-toggle" aria-label="Toggle theme">
                    <i class="fas fa-moon" aria-hidden="true"></i>
                </button>
            </li>
            <li>
                <a href="{{ site.appstore_link }}" class="nav-download-btn" target="_blank" rel="noopener">
                    <img src="{{ 'assets/appstore.png' | relative_url }}" alt="Download on the App Store" width="100" height="34">
                </a>
            </li>
        </ul>
    </nav>
</header>
